<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        .login-form, .dashboard {
            display: none;
        }
        .login-form.active, .dashboard.active {
            display: block;
        }
        h1, h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        input, select, button {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }
        button:hover {
            background: #5a6fd8;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .attendance-table th, .attendance-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .attendance-table th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .percentage {
            font-weight: bold;
        }
        .percentage.high { color: #28a745; }
        .percentage.medium { color: #ffc107; }
        .percentage.low { color: #dc3545; }
        .logout-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }
        .message {
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="login-form active">
            <h1>Attendance Portal</h1>
            <div id="loginMessage"></div>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="identifier">Student ID / Teacher ID</label>
                    <input type="text" id="identifier" required placeholder="Enter your ID">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit">Login</button>
            </form>
            <div style="text-align: center; margin-top: 1rem; color: #666;">
                <small>Sample: Student ID: 2023001, Password: password123<br>Teacher ID: T001, Password: password123</small>
            </div>
        </div>

        <!-- Student Dashboard -->
        <div id="studentDashboard" class="dashboard">
            <button class="logout-btn btn-secondary" onclick="logout()">Logout</button>
            <h2>Student Dashboard</h2>
            <div id="studentInfo"></div>
            <h3>Your Attendance</h3>
            <table class="attendance-table">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Attended</th>
                        <th>Total</th>
                        <th>Percentage</th>
                    </tr>
                </thead>
                <tbody id="attendanceTable"></tbody>
            </table>
        </div>

        <!-- Teacher Dashboard -->
        <div id="teacherDashboard" class="dashboard">
            <button class="logout-btn btn-secondary" onclick="logout()">Logout</button>
            <h2>Teacher Dashboard</h2>
            <div id="teacherInfo"></div>
            <div class="form-group">
                <label for="subjectSelect">Select Subject</label>
                <select id="subjectSelect">
                    <option value="">Choose a subject...</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Biology">Biology</option>
                </select>
            </div>
            <button onclick="loadStudents()">Load Students</button>
            <div id="teacherMessage"></div>
            <div id="studentsList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentUser = null;
        let currentToken = null;

        // Login functionality
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentToken = data.token;
                    currentUser = data.user;
                    showMessage('loginMessage', 'Login successful!', 'success');
                    setTimeout(() => {
                        showDashboard();
                    }, 1000);
                } else {
                    showMessage('loginMessage', data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('loginMessage', 'Network error. Make sure backend is running.', 'error');
            }
        });

        // Show appropriate dashboard
        function showDashboard() {
            document.getElementById('loginForm').classList.remove('active');
            if (currentUser.role === 'student') {
                document.getElementById('studentDashboard').classList.add('active');
                loadStudentData();
            } else {
                document.getElementById('teacherDashboard').classList.add('active');
                loadTeacherData();
            }
        }

        // Load student data
        async function loadStudentData() {
            document.getElementById('studentInfo').innerHTML = `
                <p><strong>Name:</strong> ${currentUser.name}</p>
                <p><strong>ID:</strong> ${currentUser.studentId}</p>
                <p><strong>Class:</strong> ${currentUser.class}</p>
            `;

            const tbody = document.getElementById('attendanceTable');
            tbody.innerHTML = '';

            currentUser.attendance.forEach(subject => {
                const row = document.createElement('tr');
                const percentageClass = subject.percentage >= 75 ? 'high' :
                                      subject.percentage >= 50 ? 'medium' : 'low';

                row.innerHTML = `
                    <td>${subject.subject}</td>
                    <td>${subject.attendedClasses}</td>
                    <td>${subject.totalClasses}</td>
                    <td class="percentage ${percentageClass}">${subject.percentage}%</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Load teacher data
        function loadTeacherData() {
            document.getElementById('teacherInfo').innerHTML = `
                <p><strong>Name:</strong> ${currentUser.name}</p>
                <p><strong>ID:</strong> ${currentUser.teacherId}</p>
                <p><strong>Subjects:</strong> ${currentUser.subjects.join(', ')}</p>
            `;
        }

        // Load students for selected subject
        async function loadStudents() {
            const subject = document.getElementById('subjectSelect').value;
            if (!subject) {
                showMessage('teacherMessage', 'Please select a subject', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/teachers/students/${subject}`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const students = await response.json();

                if (response.ok) {
                    displayStudents(students);
                } else {
                    showMessage('teacherMessage', students.message || 'Failed to load students', 'error');
                }
            } catch (error) {
                showMessage('teacherMessage', 'Network error', 'error');
            }
        }

        // Display students with attendance
        function displayStudents(students) {
            const container = document.getElementById('studentsList');
            container.innerHTML = '<h3>Students and Attendance</h3>';

            if (students.length === 0) {
                container.innerHTML += '<p>No students found for this subject.</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'attendance-table';

            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Attended</th>
                        <th>Total</th>
                        <th>Percentage</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');

            students.forEach(student => {
                const attendance = student.attendance && student.attendance[0];
                const row = document.createElement('tr');

                if (attendance) {
                    const percentageClass = attendance.percentage >= 75 ? 'high' :
                                          attendance.percentage >= 50 ? 'medium' : 'low';

                    row.innerHTML = `
                        <td>${student.studentId}</td>
                        <td>${student.name}</td>
                        <td><input type="number" class="attended" value="${attendance.attendedClasses}" min="0"></td>
                        <td><input type="number" class="total" value="${attendance.totalClasses}" min="1"></td>
                        <td class="percentage ${percentageClass}">${attendance.percentage}%</td>
                        <td><button onclick="updateAttendance('${student.studentId}', this)">Update</button></td>
                    `;
                } else {
                    row.innerHTML = `
                        <td>${student.studentId}</td>
                        <td>${student.name}</td>
                        <td colspan="4">No attendance data</td>
                    `;
                }

                tbody.appendChild(row);
            });

            container.appendChild(table);
        }

        // Update individual student attendance
        async function updateAttendance(studentId, button) {
            const row = button.closest('tr');
            const attendedInput = row.querySelector('.attended');
            const totalInput = row.querySelector('.total');
            const subject = document.getElementById('subjectSelect').value;

            const attendedClasses = parseInt(attendedInput.value);
            const totalClasses = parseInt(totalInput.value);

            if (attendedClasses < 0 || totalClasses < 1 || attendedClasses > totalClasses) {
                showMessage('teacherMessage', 'Invalid attendance values', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/students/${studentId}/attendance`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        subject,
                        attendedClasses,
                        totalClasses
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    const percentage = ((attendedClasses / totalClasses) * 100).toFixed(2);
                    const percentageCell = row.querySelector('.percentage');
                    percentageCell.textContent = `${percentage}%`;
                    percentageCell.className = `percentage ${percentage >= 75 ? 'high' : percentage >= 50 ? 'medium' : 'low'}`;
                    showMessage('teacherMessage', 'Attendance updated successfully!', 'success');
                } else {
                    showMessage('teacherMessage', data.message || 'Update failed', 'error');
                }
            } catch (error) {
                showMessage('teacherMessage', 'Network error', 'error');
            }
        }

        // Logout functionality
        function logout() {
            currentUser = null;
            currentToken = null;
            document.querySelectorAll('.dashboard').forEach(d => d.classList.remove('active'));
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('loginFormElement').reset();
            document.getElementById('studentsList').innerHTML = '';
            document.getElementById('subjectSelect').value = '';
        }

        // Utility function to show messages
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.className = `message ${type}`;
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        // Check if backend is running on page load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (!response.ok) {
                    showMessage('loginMessage', 'Backend server not running. Please start the backend first.', 'error');
                }
            } catch (error) {
                showMessage('loginMessage', 'Cannot connect to backend. Make sure it\'s running on port 5000.', 'error');
            }
        });
    </script>
</body>
</html>
